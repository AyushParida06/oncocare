name: Build and Push Docker Image

on:
  push:
    branches: [ "main", "master" ] # Triggers the pipeline when you push to main or master

jobs:
  build-and-push:
    runs-on: ubuntu-latest # The CI robot will use an Ubuntu server
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    # Logs the robot into your Docker Hub account securely using secrets
    - name: Log in to Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    # Builds the Dockerfile and pushes it directly to your Docker Hub account
    - name: Build and push Docker image
      uses: docker/build-push-action@v4
      with:
        context: .
        push: true
        tags: ${{ secrets.DOCKER_USERNAME }}/oncocare-frontend:latest
